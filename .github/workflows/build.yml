name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --name=Chelp --onefile --windowed `
          --add-data="src/core;src/core" `
          --add-data="src/ui;src/ui" `
          --add-data="src/plugins;src/plugins" `
          --add-data="config;config" `
          --hidden-import=customtkinter `
          --hidden-import=PIL `
          --hidden-import=core.config `
          --hidden-import=core.plugin_manager `
          --hidden-import=core.ai_matcher `
          --hidden-import=core.updater `
          --hidden-import=ui.main_window `
          --hidden-import=ui.ai_chat_window `
          --hidden-import=ui.settings_window `
          --hidden-import=plugins.base `
          --hidden-import=plugins.disk_cleaner `
          --hidden-import=plugins.display_fixer `
          --hidden-import=plugins.input_method `
          --hidden-import=plugins.network_fixer `
          --hidden-import=plugins.startup_manager `
          --noconfirm src/main.py

    - name: Create archive
      run: |
        cd dist
        7z a ../Chelp.zip Chelp.exe
        cd ..

    - name: Get version
      id: version
      run: |
        if ("${{ github.ref }}" -match "refs/tags/v*") {
          $version = "${{ github.ref }}" -replace "refs/tags/v", ""
        } else {
          $version = "latest"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Chelp-Windows
        path: Chelp.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: Chelp.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
